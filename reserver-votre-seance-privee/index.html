<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrongStudio Kourou — Bilan offert</title>
<meta name="robots" content="noindex,nofollow">
<!-- Redirection HTML automatique (fallback si JS désactivé) -->
<meta http-equiv="refresh" content="0; url=/">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0D1B2A;color:#EAEEF2;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:1.5rem;text-align:center;
  }
  .box{max-width:480px}
  h1{font-size:1.5rem;color:#E8C547;margin-bottom:.75rem;font-weight:700}
  p{color:#A8B4BF;line-height:1.6;font-size:.95rem;margin-bottom:1.5rem}
  .spinner{
    width:36px;height:36px;margin:0 auto 1.25rem;
    border:3px solid rgba(232,197,71,.2);
    border-top-color:#E8C547;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#E8C547;text-decoration:underline}
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>StrongStudio Kourou</h1>
    <p>Redirection vers votre bilan offert…</p>
    <p>Si la redirection ne fonctionne pas, <a href="/" id="manual-link">cliquez ici</a>.</p>
  </div>

<script>
(function(){
  // Conserver les paramètres UTM, fbclid, et autres trackers Meta lors de la redirection
  var search = window.location.search || '';
  var hash = window.location.hash || '';
  var target = '/' + search + hash;

  var manualLink = document.getElementById('manual-link');
  if(manualLink){ manualLink.href = target; }

  // Redirection JavaScript instantanée (plus rapide que le meta refresh)
  window.location.replace(target);
})();
</script>
</body>
</html>
